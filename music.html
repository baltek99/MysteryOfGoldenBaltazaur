<!DOCTYPE html>
<html>
<head>
  <title>MysteryOfGoldenBaltazar</title>
  <style>
	body {
	  display: flex;
	  flex-direction: column; 
	  justify-content: center; /* poziome centrowanie */
	  align-items: center;     /* pionowe centrowanie */
	  height: 100vh;           /* cała wysokość ekranu */
	  margin: 0;               /* usuwa marginesy */
	  background-color: black; /* przykładowe ciemne tło */
	}
	
	.gold-text {
		background: linear-gradient(90deg,#b78e3f,#d4a44d,#e6b55b,#d4a44d,#b78e3f);
		background-size: 200%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		animation: shine 1s linear infinite;
		  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
		text-align: center; 
		font-size: 7rem;
		margin: 0;  
	}

	@keyframes shine {
		0% { background-position: 0% }
		100% { background-position: 200% }
	}

	/* Kontener */
	.music-player {
	  margin: 25px;
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  width: 300px;
	  background: linear-gradient(90deg, #d4a44d, #ffe066);
	  border-radius: 12px;
	  padding: 20px;
	  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
	  font-family: sans-serif;
	  color: #1e1e1e;
	}

	/* Play/pause button */
	.play-btn {
	  font-size: 2rem;
	  background: none;
	  border: none;
	  cursor: pointer;
	  margin-bottom: 15px;
	  color: #1e1e1e;
	  transition: transform 0.2s ease;
	}
	.play-btn:hover {
	  transform: scale(1.2);
	}

	/* Progres bar */
	.progress-container {
	  width: 100%;
	  height: 8px;
	  background: rgba(0,0,0,0.2);
	  border-radius: 4px;
	  cursor: pointer;
	  margin-bottom: 10px;
	}
	.progress-bar {
	  width: 0%;
	  height: 100%;
	  background: #1e1e1e;
	  border-radius: 4px;
	}

	/* Czas */
	.time {
	  font-size: 0.9rem;
	}
</style>


</script>
</head>
<body>
	<h1 class="gold-text">ZAGADKA MUZYCZNA</h1>
<div class="music-player">
  <audio class="audio" src="nevermind.mp3"></audio>

  <button class="play-btn">▶️</button>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>

  <div class="time">
		<span class="current-time">0:00</span> / <span class="duration">0:00</span>
	  </div>
</div>
	
<div class="music-player">
  <audio class="audio" src="jar.mp3"></audio>

  <button class="play-btn">▶️</button>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>

  <div class="time">
		<span class="current-time">0:00</span> / <span class="duration">0:00</span>
	  </div>
</div>
	
	<script>
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".music-player").forEach(player => {
    const audio = player.querySelector(".audio");
    const btn = player.querySelector(".play-btn");
    const progressBar = player.querySelector(".progress-bar");
    const progressContainer = player.querySelector(".progress-container");
    const currentTimeEl = player.querySelector(".current-time");
    const durationEl = player.querySelector(".duration");

    // 🔴 zabezpieczenie przed błędami HTML
    if (!audio || !btn) return;

    // ▶️ PLAY / PAUSE
    btn.addEventListener("click", () => {

      // 🔥 zatrzymaj inne audio (tylko jedno gra naraz)
      document.querySelectorAll(".audio").forEach(a => {
        if (a !== audio) {
          a.pause();
          a.currentTime = 0;

          // reset przycisków innych playerów
          const otherBtn = a.closest(".music-player")?.querySelector(".play-btn");
          if (otherBtn) otherBtn.textContent = "▶️";
        }
      });

      if (audio.paused) {
        audio.play().catch(err => console.log("Play error:", err));
        btn.textContent = "⏸";
      } else {
        audio.pause();
        btn.textContent = "▶️";
      }
    });

    // ⏱ długość tracka
    audio.addEventListener("loadedmetadata", () => {
      if (durationEl) {
        durationEl.textContent = formatTime(audio.duration);
      }
    });

    // 📊 progress
    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;

      const percent = (audio.currentTime / audio.duration) * 100;
      if (progressBar) {
        progressBar.style.width = percent + "%";
      }

      if (currentTimeEl) {
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });

    // ⏩ klik w progress bar
    if (progressContainer) {
      progressContainer.addEventListener("click", (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;

        audio.currentTime = (clickX / width) * audio.duration;
      });
    }

    // 🔁 reset button po zakończeniu
    audio.addEventListener("ended", () => {
      btn.textContent = "▶️";
    });

    // ⏱ helper
    function formatTime(time) {
      if (isNaN(time)) return "0:00";
      const minutes = Math.floor(time / 60);
      const seconds = Math.floor(time % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

  });

});
	</script>
</body>
</html>
