<!DOCTYPE html>
<html>
<head>
  <title>MysteryOfGoldenBaltazar</title>
  <style>
    body {
		background-image: url('MERCINIAKI.png');
		background-repeat: no-repeat;
		background-attachment: fixed;
		background-size: 100% 100%;

		display: flex;
		flex-direction: column; 
		justify-content: center; 
		align-items: center;     
		height: 100vh;           
		margin: 0;               
		background-color: black; 
	}
	
	.gold-text {
		background: linear-gradient(90deg,#b78e3f,#d4a44d,#e6b55b,#d4a44d,#b78e3f);
		background-size: 200%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		animation: shine 1s linear infinite;
		text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
		text-align: center; 
		font-size: 7rem;
		margin: 50px;  
	}

	@keyframes shine {
		0% { background-position: 0% }
		100% { background-position: 200% }
	}

</style>
</head>
<body>
	<h1 class="gold-text">ZAGADKA NUMERO UNO</h1>
	<h2 class="gold-text" style="font-size: 3rem;">Szukaj tam gdzie Czarny Gad wije gniazdo i składa jaja...</h2>
</body>
</html>
