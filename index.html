<!DOCTYPE html>
<html>
<head>
  <title>MysteryOfGoldenBaltazar</title>
  <style>
	body {
	  display: flex;
	  flex-direction: column; 
	  justify-content: center; /* poziome centrowanie */
	  align-items: center;     /* pionowe centrowanie */
	  height: 100vh;           /* cała wysokość ekranu */
	  margin: 0;               /* usuwa marginesy */
	  background-color: black; /* przykładowe ciemne tło */
	}
	
	.gold-text {
		background: linear-gradient(90deg,#b78e3f,#d4a44d,#e6b55b,#d4a44d,#b78e3f);
		background-size: 200%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		animation: shine 1s linear infinite;
		  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
		text-align: center; 
		font-size: 7rem;
		margin: 0;  
	}

	@keyframes shine {
		0% { background-position: 0% }
		100% { background-position: 200% }
	}

	.gold-button {
		margin-top: 100px;
		display: inline-block;
		padding: 15px 50px;
		font-size: 1.5rem;
		font-weight: bold;
		text-transform: uppercase;
		text-decoration: none;
		border-radius: 12px;

		background: linear-gradient(90deg, #a8731e, #d4a44d, #ffe066, #d4a44d, #a8731e);
		background-size: 200%; /* zwiększamy, żeby gradient mógł się przesuwać */
		color: black;
		box-shadow: 0 4px 10px rgba(0,0,0,0.4), 0 0 15px rgba(255, 214, 102, 0.5);
		transition: all 0.3s ease;

		animation: shine 3s linear infinite; /* dodajemy animację */
	}
	
	.gold-button:hover {
		transform: translateY(-3px);
		box-shadow: 0 6px 15px rgba(0,0,0,0.5), 0 0 20px rgba(255, 214, 102, 0.7);
	}
</style>
</head>
<body>
	<h1 class="gold-text">Welcome to The Mighty Mystery of The Golden Baltazaur !!!</h1>
	<a href="czarnygad.html" class="gold-button">ENTER THE GAME</a>
</body>
</html>
