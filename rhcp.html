<!DOCTYPE html>
<html>
<head>
  <title>MysteryOfGoldenBaltazar</title>
  <style>
	body {
	  display: flex;
	  flex-direction: column; 
	  justify-content: center; /* poziome centrowanie */
	  align-items: center;     /* pionowe centrowanie */
	  height: 100vh;           /* cała wysokość ekranu */
	  margin: 0;               /* usuwa marginesy */
	  background-color: black; /* przykładowe ciemne tło */
	}
	
	.gold-text {
		background: linear-gradient(90deg,#b78e3f,#d4a44d,#e6b55b,#d4a44d,#b78e3f);
		background-size: 200%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		animation: shine 1s linear infinite;
		  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
		text-align: center; 
		font-size: 7rem;
		margin: 0;  
	}

	@keyframes shine {
		0% { background-position: 0% }
		100% { background-position: 200% }
	}

/* Kontener */
.music-player {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 300px;
  background: linear-gradient(90deg, #d4a44d, #ffe066);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  font-family: sans-serif;
  color: #1e1e1e;
}

/* Play/pause button */
#play-btn {
  font-size: 2rem;
  background: none;
  border: none;
  cursor: pointer;
  margin-bottom: 15px;
  color: #1e1e1e;
  transition: transform 0.2s ease;
}
#play-btn:hover {
  transform: scale(1.2);
}

/* Progres bar */
.progress-container {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  cursor: pointer;
  margin-bottom: 10px;
}
.progress-bar {
  width: 0%;
  height: 100%;
  background: #1e1e1e;
  border-radius: 4px;
}

/* Czas */
.time {
  font-size: 0.9rem;
}
</style>


</script>
</head>
<body>
	<h1 class="gold-text">ZAGADKA MUZYCZNA</h1>
	<div class="music-player">
	  <audio id="audio" src="nevermind.mp3"></audio>

	  <button id="play-btn">▶️</button>

	  <div class="progress-container">
		<div class="progress-bar"></div>
	  </div>

	  <div class="time">
		<span id="current-time">0:00</span> / <span id="duration">0:00</span>
	  </div>
	</div>
	
	<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play-btn");
const progressBar = document.querySelector(".progress-bar");
const currentTimeEl = document.getElementById("current-time");
const durationEl = document.getElementById("duration");

// Play / Pause
playBtn.addEventListener("click", () => {
  console.log("Kliknięto przycisk!"); // <-- sprawdź, czy się pojawia

  if (audio.paused) {
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶️";
  }
});

// Ustawianie długości po załadowaniu
audio.addEventListener("loadedmetadata", () => {
  durationEl.textContent = formatTime(audio.duration);
});

// Aktualizacja progresu
audio.addEventListener("timeupdate", () => {
  const progressPercent = (audio.currentTime / audio.duration) * 100;
  progressBar.style.width = `${progressPercent}%`;
  currentTimeEl.textContent = formatTime(audio.currentTime);
});

// Kliknięcie na pasek progresu
document.querySelector(".progress-container").addEventListener("click", (e) => {
  const width = e.currentTarget.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
});

// Funkcja formatująca czas
function formatTime(time) {
  const minutes = Math.floor(time / 60);
  const seconds = Math.floor(time % 60).toString().padStart(2, "0");
  return `${minutes}:${seconds}`;
}
</body>
</html>
